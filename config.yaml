# MDF Strip 단면 최적화 — 스트립 수별 배치 탐색

strip:
  b: 4              # 기본 방향 x-폭 (mm): 값=1 배치 시
  h: 6              # 기본 방향 y-높이 (mm): 값=1 배치 시
  cost_per_unit: 10 # 스트립 1개 비용

grid:
  rows: 5
  cols: 5
  cell_size: 10     # 격자 셀 크기 (mm)

ga:
  population_size: 300
  generations: 200
  mutation_rate: 0.05
  crossover_rate: 0.8
  elite_ratio: 0.1
  top_n: 3
  min_strips: 1
  exhaustive_max: 6   # N ≤ 이 값: 전수탐색 (모든 연결 배치)
  ga_max_collect: 500 # N > exhaustive_max: GA로 최대 수집할 유효 단면 수

column_filter:
  ix_iy_min: 0.7
  ix_iy_max: 1.3

core_filter:
  ix_iy_min: 0.5
  ix_iy_max: 2.0

output:
  excel_path: outputs/results_by_strip_count.xlsx
  image_dir: outputs/images/strip_search
